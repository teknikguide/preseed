# Lokalisering
d-i debian-installer/locale string sv_SE.UTF-8
d-i keyboard-configuration/xkb-keymap select se

# Nätverk
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian-auto
d-i netcfg/get_domain string local

# Föredra alltid kabel framför wifi om datorn har båda.
# OBS: den faktiska fixen ligger INTE här längre, utan körs via kernel-
# kommandoraden i grub.cfg/spkgtk.cfg (preseed/early_command=/cdrom/fix-
# wifi.sh). Anledning: preseed.cfg hämtas via preseed/url över nätverket,
# vilket kräver att nätverket (och därmed nätverkskortsvalet) redan är
# klart INNAN den här filen ens går att läsa - ett early_command här inuti
# hinner alltså aldrig köra i tid, oavsett vad det innehåller (bekräftat:
# /etc/modprobe.d/no-wifi.conf skapades aldrig automatiskt, bara manuellt).
# Se fix-wifi.sh i repo-roten för själva logiken.

# Firmware - kan behövas på fysisk hårdvara (t.ex. vissa nätverkskort),
# virtuella maskiner (virtio) klarar sig utan detta men det stör inte.
d-i hw-detect/load_firmware boolean true
d-i apt-setup/non-free-firmware boolean true

# Spegel
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Konton
d-i passwd/root-login boolean false
d-i passwd/user-fullname string debadmin
d-i passwd/username string debadmin
d-i passwd/user-password password installtemp
d-i passwd/user-password-again password installtemp
d-i user-setup/allow-password-weak boolean true

# Tid
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Stockholm
d-i clock-setup/ntp boolean true

# Partitionering (hela disken, atomic = allt i en partition)
# Fungerar automatiskt både för BIOS/legacy och UEFI: partman-efi lägger
# själv till en EFI-partition i schemat om installern körs i UEFI-läge,
# annars blir det ett vanligt BIOS-upplägg. Kräver ingen manuell växling.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Paket
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string vim curl cloud-init
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# Bootloader
# only_debian + bootdev "default" installerar grub till rätt ställe
# (MBR vid BIOS, EFI-partitionen vid UEFI) utan att fråga.
# with_other_os gör att det även går igenom på maskiner där disken redan
# innehåller ett annat OS (vanligt på fysisk hårdvara, ovanligt i en tom VM).
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# Cloud-init seed + dynamiskt hostname
d-i preseed/late_command string \
    mkdir -p /target/var/lib/cloud/seed/nocloud; \
    wget -O /target/var/lib/cloud/seed/nocloud/user-data https://raw.githubusercontent.com/teknikguide/preseed/main/cloudinit/user-data; \
    NEWHOST="DEB-$(date +%y%m%d)-$(head /dev/urandom | tr -dc a-z0-9 | head -c4)"; \
    echo "$NEWHOST" > /target/etc/hostname; \
    sed -i "s/debian-auto/$NEWHOST/g" /target/etc/hosts; \
    echo "instance-id: $NEWHOST" > /target/var/lib/cloud/seed/nocloud/meta-data; \
    echo "local-hostname: $NEWHOST" >> /target/var/lib/cloud/seed/nocloud/meta-data

# Avsluta utan att fråga
d-i finish-install/reboot_in_progress note
